<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Eirilar Protection</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            display: flex;
            height: 100vh;
        }

        /* Lado esquerdo (branding) */
        .left {
            flex: 1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 1px solid #eee;
        }

        .left img {
            width: 160px;
            margin-bottom: 20px;
        }

        .left h2 {
            color: #e74c3c;
            margin: 0;
        }

        .left p {
            color: #777;
            font-size: 14px;
        }

        /* Lado direito (login) */
        .right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #fff;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 320px;
        }

        .card h3 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        input:focus {
            border-color: #e74c3c;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #d63b2f;
        }

        .error {
            color: red;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .footer {
            margin-top: 10px;
            font-size: 12px;
            color: #999;
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- ESQUERDA -->
    <div class="left">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
        <h2>Eirilar Protection</h2>
        <p>Sistema Anti-Fraude Seguro</p>
    </div>

    <!-- DIREITA -->
    <div class="right">
        <div class="card">
            <h3>Login do Sistema</h3>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <input type="text" name="username" placeholder="Usuário">
                <input type="password" name="password" placeholder="Senha">
                <button type="submit">Entrar</button>
            </form>

            <div class="footer">
                Acesso restrito para administradores
            </div>
        </div>
    </div>

</body>
</html>
