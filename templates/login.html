<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login | Anti-Fraude</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b1220;
        color: white;
    }

    /* layout principal */
    .container {
        display: flex;
        height: 100vh;
    }

    /* lado esquerdo */
    .left {
        flex: 1;
        background: #0b1220;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border-right: 1px solid #1d2a44;
        text-align: center;
        padding: 20px;
    }

    .logo {
        width: 110px;
        margin-bottom: 15px;
    }

    .title {
        font-size: 22px;
        font-weight: bold;
        color: #4da3ff;
        margin-bottom: 10px;
    }

    .subtitle {
        font-size: 13px;
        color: #888;
        max-width: 260px;
    }

    /* lado direito */
    .right {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0b1220;
    }

    /* card central */
    .card {
        width: 360px;
        background: #111a2e;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 0 25px rgba(0,0,0,0.5);

        display: flex;
        flex-direction: column;
        align-items: center;
    }

    form {
        width: 100%;
    }

    input {
        width: 100%;
        box-sizing: border-box;
        padding: 12px;
        margin: 8px 0;
        border: 1px solid #1d2a44;
        border-radius: 8px;
        background: #0b1220;
        color: white;
        outline: none;
        transition: 0.2s;
    }

    input:focus {
        border: 1px solid #4da3ff;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #4da3ff;
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
        transition: 0.2s;
    }

    button:hover {
        background: #2f8be6;
    }

    a {
        color: #4da3ff;
        text-decoration: none;
        font-size: 13px;
    }

    .footer {
        margin-top: 12px;
        font-size: 12px;
        color: #777;
        text-align: center;
    }

</style>
</head>

<body>

<div class="container">

    <!-- ESQUERDA (branding do painel) -->
    <div class="left">
        <img class="logo" src="https://i.ibb.co/N6xvdtss/eirilar-logo-vermelho.png">
        <div class="title">Painel Anti-Fraude</div>
        <div class="subtitle">
            Sistema interno de proteção e análise de transações da equipe.
        </div>
    </div>

    <!-- DIREITA (login centralizado perfeito) -->
    <div class="right">

        <div class="card">

            <form method="POST">
                <input type="text" name="username" placeholder="Usuário" required>
                <input type="password" name="password" placeholder="Senha" required>

                <button type="submit">Entrar</button>
            </form>

            <div style="margin-top: 12px;">
                <a href="/register">Criar nova conta</a>
            </div>

            <div class="footer">
                Acesso restrito à equipe interna
            </div>

        </div>

    </div>

</div>

</body>
</html>
