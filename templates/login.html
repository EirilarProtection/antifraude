<!DOCTYPE html>

<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eirilar Security - Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f5f6fa;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:100%;
    max-width:420px;
    background:#fff;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 35px rgba(0,0,0,.08);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo img{
    width:220px;
}

h2{
    text-align:center;
    color:#c62828;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

input:focus{
    border-color:#c62828;
    outline:none;
}

button{
    width:100%;
    background:#c62828;
    color:white;
    border:none;
    padding:14px;
    border-radius:10px;
    font-size:15px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#a71d1d;
}

.footer{
    text-align:center;
    margin-top:20px;
}

.footer a{
    text-decoration:none;
    color:#c62828;
    font-weight:600;
}

</style>

</head>

<body>

<div class="card">

```
<div class="logo">
    <img src="{{ url_for('static', filename='img/eirilar-logo.png') }}">
</div>

<h2>Painel Antifraude</h2>

<form method="POST">

    <input
        type="text"
        name="email"
        placeholder="E-mail ou Usuário"
        required
    >

    <input
        type="password"
        name="password"
        placeholder="Senha"
        required
    >

    <button type="submit">
        Entrar
    </button>

</form>

<div class="footer">
    <a href="/register">Criar nova conta</a>
</div>
```

</div>

</body>
</html>
