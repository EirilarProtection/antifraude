<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login | Painel Anti-Fraude</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0f1a;
        color: white;
    }

    .container {
        display: flex;
        height: 100vh;
    }

    /* ESQUERDA */
    .left {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border-right: 1px solid #1f2a3a;
        background: #0b0f1a;
        text-align: center;
        padding: 20px;
    }

    /* 🔥 LOGO MAIOR */
    .logo {
        width: 180px;
        margin-bottom: 20px;
        filter: drop-shadow(0 0 12px rgba(229, 57, 53, 0.35));
    }

    .title {
        font-size: 22px;
        font-weight: bold;
        color: #e53935;
        margin-bottom: 10px;
    }

    .subtitle {
        font-size: 13px;
        color: #8b93a7;
        max-width: 260px;
    }

    /* DIREITA */
    .right {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0b0f1a;
    }

    .card {
        width: 360px;
        background: #121826;
        padding: 40px;
        border-radius: 12px;
        border: 1px solid #1f2a3a;
        box-shadow: 0 0 25px rgba(0,0,0,0.6);

        display: flex;
        flex-direction: column;
        align-items: center;
    }

    form {
        width: 100%;
    }

    input {
        width: 100%;
        box-sizing: border-box;
        padding: 12px;
        margin: 8px 0;
        border: 1px solid #1f2a3a;
        border-radius: 8px;
        background: #0b0f1a;
        color: white;
        outline: none;
    }

    input:focus {
        border: 1px solid #e53935;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #e53935;
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
        transition: 0.2s;
    }

    button:hover {
        background: #c62828;
    }

    a {
        color: #e53935;
        text-decoration: none;
        font-size: 13px;
    }

    .footer {
        margin-top: 12px;
        font-size: 12px;
        color: #8b93a7;
        text-align: center;
    }

</style>
</head>

<body>

<div class="container">

    <!-- ESQUERDA -->
    <div class="left">

        <img class="logo" src="https://i.ibb.co/N6xvdtss/eirilar-logo-vermelho.png">

        <div class="title">Painel Anti-Fraude</div>

        <div class="subtitle">
            Sistema interno de monitoramento e proteção de transações da equipe.
        </div>

    </div>

    <!-- DIREITA -->
    <div class="right">

        <div class="card">

            <form method="POST">
                <input type="text" name="username" placeholder="Usuário" required>
                <input type="password" name="password" placeholder="Senha" required>

                <button type="submit">Entrar</button>
            </form>

            <div style="margin-top: 12px;">
                <a href="/register">Criar nova conta</a>
            </div>

            <div class="footer">
                Acesso restrito à equipe interna
            </div>

        </div>

    </div>

</div>

</body>
</html>
