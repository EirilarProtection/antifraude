<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>
<body style="background:#f4f6f9;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="background:white;padding:30px;border-radius:10px;width:300px;">
<h2>Login</h2>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<form method="POST">
<input name="username" placeholder="Usuário" style="width:100%;padding:10px;margin:5px 0;">
<input name="password" type="password" placeholder="Senha" style="width:100%;padding:10px;margin:5px 0;">
<button style="width:100%;padding:10px;background:#e53935;color:white;border:none;">Entrar</button>
</form>

<a href="/register">Criar conta</a>
</div>

</body>
</html>
