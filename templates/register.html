<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro | Anti-Fraude</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b1220;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
    }

    .box {
        width: 360px;
        background: #111a2e;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 0 25px rgba(0,0,0,0.6);
        text-align: center;
    }

    .logo-img {
        width: 90px;
        margin-bottom: 10px;
    }

    .title {
        font-size: 18px;
        font-weight: bold;
        color: #4da3ff;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border: none;
        border-radius: 8px;
        background: #0b1220;
        color: white;
        outline: none;
        border: 1px solid #1d2a44;
    }

    input:focus {
        border: 1px solid #4da3ff;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #4da3ff;
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #2f8be6;
    }

    a {
        color: #4da3ff;
        text-decoration: none;
        font-size: 13px;
    }

    .footer {
        margin-top: 15px;
        font-size: 12px;
        color: #777;
    }
</style>
</head>

<body>

<div class="box">

    <img class="logo-img" src="https://i.ibb.co/N6xvdtss/eirilar-logo-vermelho.png">

    <div class="title">Criar conta</div>

    <form method="POST">
        <input type="text" name="username" placeholder="Usuário" required>
        <input type="password" name="password" placeholder="Senha" required>

        <button type="submit">Cadastrar</button>
    </form>

    <br>
    <a href="/login">Já tenho conta</a>

    <div class="footer">
        Apenas equipe autorizada
    </div>

</div>

</body>
</html>
