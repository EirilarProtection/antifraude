<!DOCTYPE html>
<html>
<head>
<title>Registro</title>
</head>
<body style="background:#f4f6f9;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="background:white;padding:30px;border-radius:10px;width:350px;">
<h2>Criar Conta</h2>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<form method="POST">
<input name="username" placeholder="Usuário" style="width:100%;padding:10px;margin:5px 0;">
<input name="password" type="password" placeholder="Senha" style="width:100%;padding:10px;margin:5px 0;">
<input name="email" placeholder="Email" style="width:100%;padding:10px;margin:5px 0;">
<input name="phone" placeholder="Telefone" style="width:100%;padding:10px;margin:5px 0;">
<input name="birthdate" type="date" style="width:100%;padding:10px;margin:5px 0;">

<button style="width:100%;padding:10px;background:#e53935;color:white;border:none;">Criar conta</button>
</form>

<a href="/">Já tenho conta</a>
</div>

</body>
</html>
