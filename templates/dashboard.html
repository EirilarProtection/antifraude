<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Security Panel</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    background: #fff;
    height: 100vh;
    position: fixed;
    box-shadow: 2px 0 15px rgba(0,0,0,0.05);
}

.logo {
    text-align: center;
    padding: 20px;
    border-bottom: 1px solid #eee;
}

.logo img {
    width: 160px;
}

.menu a {
    display: block;
    padding: 12px;
    margin: 6px;
    text-decoration: none;
    color: #333;
    border-radius: 8px;
}

.menu a:hover {
    background: #c62828;
    color: #fff;
}

/* MAIN */
.main {
    margin-left: 260px;
    padding: 25px;
    width: 100%;
}

/* TOPBAR */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
    padding: 15px;
    border-radius: 12px;
}

/* CARDS */
.cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
}

/* TABLE */
.table {
    width: 100%;
    margin-top: 20px;
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
}

.table th {
    background: #c62828;
    color: white;
    padding: 12px;
}

.table td {
    padding: 12px;
    border-bottom: 1px solid #eee;
}

/* BUTTONS */
.btn {
    padding: 6px 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin: 2px;
}

.block { background: #e74c3c; color: white; }
.unblock { background: #2ecc71; color: white; }
.details { background: #3498db; color: white; }
.notify { background: #f39c12; color: white; }

.blocked-row {
    background: #ffe6e6;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        <img src="https://i.ibb.co/ZRNVYdnm/eirilar-logo-vermelho.png">
    </div>

    <div class="menu">
        <a href="#">Dashboard</a>
        <a href="#">IPs</a>
        <a href="#">Usuários</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOP -->
    <div class="topbar">
        <h2>Security Panel</h2>
        <div>
            <span>Olá, {{ username }}</span>
            <a href="/logout">Sair</a>
        </div>
    </div>

    <!-- CARDS -->
    <div class="cards">
        <div class="card"><h2 id="users">0</h2><p>Usuários</p></div>
        <div class="card"><h2 id="logins">0</h2><p>Logins</p></div>
        <div class="card"><h2 id="risk">0</h2><p>Risco Alto</p></div>
        <div class="card"><h2>99%</h2><p>Uptime</p></div>
    </div>

    <!-- TABLE -->
    <h3 style="margin-top:25px;">IPs Detectados</h3>

    <table class="table">
        <thead>
            <tr>
                <th>Usuário</th>
                <th>IP</th>
                <th>Cidade</th>
                <th>Estado</th>
                <th>País</th>
                <th>Browser</th>
                <th>Data</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="ipTable"></tbody>
    </table>

</div>

<script>

// ================= STATS =================
fetch("/api/stats")
.then(r => r.json())
.then(d => {
    document.getElementById("users").innerText = d.users;
    document.getElementById("logins").innerText = d.logins;
    document.getElementById("risk").innerText = d.high_risk;
});

// ================= ACTIONS =================
async function blockIP(id){
    await fetch("/api/ip/block", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({id})
    });
    location.reload();
}

async function unblockIP(id){
    await fetch("/api/ip/unblock", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({id})
    });
    location.reload();
}

async function details(id){
    const r = await fetch(`/api/ip/details/${id}`);
    const d = await r.json();

    alert(
        `DETALHES IP\n\n` +
        `User: ${d.user}\n` +
        `IP: ${d.ip}\n` +
        `City: ${d.city}\n` +
        `State: ${d.state}\n` +
        `Country: ${d.country}\n` +
        `Browser: ${d.browser}\n` +
        `OS: ${d.os}\n` +
        `Blocked: ${d.blocked}`
    );
}

async function notify(id){
    const msg = prompt("Mensagem de alerta:");
    if(!msg) return;

    await fetch("/api/ip/notify", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({id, message: msg})
    });

    alert("Notificação salva!");
}

// ================= LOAD IPS =================
fetch("/api/logins")
.then(r => r.json())
.then(data => {

    let table = document.getElementById("ipTable");
    table.innerHTML = "";

    data.forEach(ip => {

        table.innerHTML += `
        <tr class="${ip.blocked ? 'blocked-row' : ''}">
            <td><b>${ip.user}</b></td>
            <td>${ip.ip}</td>
            <td>${ip.city || '-'}</td>
            <td>${ip.state || '-'}</td>
            <td>${ip.country}</td>
            <td>${ip.browser}</td>
            <td>${ip.date}</td>
            <td>
                <button class="btn block" onclick="blockIP(${ip.id})">Bloquear</button>
                <button class="btn unblock" onclick="unblockIP(${ip.id})">Desbloquear</button>
                <button class="btn details" onclick="details(${ip.id})">Detalhes</button>
                <button class="btn notify" onclick="notify(${ip.id})">Notificar</button>
            </td>
        </tr>
        `;
    });

});
</script>

</body>
</html>
