<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Eirilar Security Dashboard</title>

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    background: #fff;
    height: 100vh;
    position: fixed;
    box-shadow: 2px 0 15px rgba(0,0,0,0.05);
}

.logo {
    text-align: center;
    padding: 20px;
    border-bottom: 1px solid #eee;
}

.logo img {
    width: 160px;
}

.menu a {
    display: block;
    padding: 12px;
    margin: 6px;
    text-decoration: none;
    color: #333;
    border-radius: 8px;
}

.menu a:hover {
    background: #c62828;
    color: white;
}

/* MAIN */
.main {
    margin-left: 260px;
    padding: 25px;
    width: 100%;
}

/* TOPBAR */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: white;
    padding: 15px;
    border-radius: 12px;
}

/* CARDS */
.cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
}

/* TABLE */
.table {
    width: 100%;
    margin-top: 20px;
    background: white;
    border-radius: 12px;
    overflow: hidden;
}

.table th {
    background: #c62828;
    color: white;
    padding: 12px;
}

.table td {
    padding: 12px;
    border-bottom: 1px solid #eee;
}

/* BUTTONS */
.btn {
    padding: 6px 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.block { background: #e74c3c; color: white; }
.unblock { background: #2ecc71; color: white; }
.details { background: #3498db; color: white; }

</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">
        <img src="https://i.ibb.co/ZRNVYdnm/eirilar-logo-vermelho.png">
    </div>

    <div class="menu">
        <a href="#">Dashboard</a>
        <a href="#">IPs</a>
        <a href="#">Usuários</a>
    </div>
</div>

<div class="main">

    <div class="topbar">
        <h2>Security Panel</h2>
        <div>
            <span>Olá, {{ username }}</span>
            <a href="/logout">Sair</a>
        </div>
    </div>

    <!-- CARDS -->
    <div class="cards">
        <div class="card"><h2 id="users">0</h2><p>Usuários</p></div>
        <div class="card"><h2 id="logins">0</h2><p>Logins</p></div>
        <div class="card"><h2 id="risk">0</h2><p>Risco Alto</p></div>
        <div class="card"><h2>99%</h2><p>Uptime</p></div>
    </div>

    <!-- TABLE -->
    <h3>IPs Detectados</h3>

    <table class="table">
        <thead>
            <tr>
                <th>Usuário</th>
                <th>IP</th>
                <th>Cidade</th>
                <th>Estado</th>
                <th>País</th>
                <th>Browser</th>
                <th>Data</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody id="ipTable"></tbody>
    </table>

</div>

<script>

// STATS
fetch("/api/stats")
.then(r => r.json())
.then(d => {
    document.getElementById("users").innerText = d.users;
    document.getElementById("logins").innerText = d.logins;
    document.getElementById("risk").innerText = d.high_risk;
});

// LOGINS
fetch("/api/logins")
.then(r => r.json())
.then(data => {

    let table = document.getElementById("ipTable");
    table.innerHTML = "";

    data.forEach(ip => {

        table.innerHTML += `
        <tr>
            <td><b>${ip.user || 'User'}</b></td>
            <td>${ip.ip}</td>
            <td>${ip.city || '-'}</td>
            <td>${ip.state || '-'}</td>
            <td>${ip.country}</td>
            <td>${ip.browser}</td>
            <td>${ip.date}</td>
            <td>
                <button class="btn block">Bloquear</button>
                <button class="btn unblock">Desbloquear</button>
                <button class="btn details"
                    onclick="alert('Detalhes do IP: ${ip.ip}\\nUser: ${ip.user}')">
                    Detalhes
                </button>
            </td>
        </tr>
        `;
    });

});

</script>

</body>
</html>
