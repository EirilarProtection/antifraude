<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eirilar Security Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Segoe UI;background:#f4f6fb;display:flex}
.sidebar{
width:260px;height:100vh;position:fixed;
background:linear-gradient(180deg,#112244,#1d3565);
color:white;padding:25px
}
.logo{text-align:center;margin-bottom:30px}
.logo img{max-width:140px}
.menu a{
display:block;color:white;text-decoration:none;
padding:14px;border-radius:12px;margin-bottom:8px
}
.menu a:hover{background:rgba(255,255,255,.1)}
.main{margin-left:260px;padding:30px;width:100%}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.card{
padding:20px;border-radius:20px;color:white;
box-shadow:0 10px 25px rgba(0,0,0,.1)
}
.red{background:#ef4444}
.blue{background:#3b82f6}
.orange{background:#f59e0b}
.green{background:#22c55e}
.table{
margin-top:25px;background:white;border-radius:20px;
overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,.08)
}
table{width:100%;border-collapse:collapse}
th{
background:#14284d;color:white;padding:16px
}
td{padding:16px;border-bottom:1px solid #eee}
.btn{
border:none;padding:10px;border-radius:10px;
cursor:pointer;color:white
}
.block{background:#ef4444}
.unblock{background:#22c55e}
.details{background:#3b82f6}
.notify{background:#f59e0b}
</style>
</head>
<body>

<div class="sidebar">
<div class="logo">
<img src="https://i.ibb.co/XrCbLdJR/eirilar-logo-vermelho.png">
</div>

<div class="menu">
<a href="#"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="#"><i class="fa fa-users"></i> Usuários</a>
<a href="#"><i class="fa fa-shield-halved"></i> Segurança</a>
<a href="#"><i class="fa fa-bell"></i> Notificações</a>
<a href="#"><i class="fa fa-gear"></i> Configurações</a>
</div>
</div>

<div class="main">

<div class="cards">
<div class="card red"><h2>1.542</h2>Usuários Totais</div>
<div class="card blue"><h2>327</h2>IPs Ativos</div>
<div class="card orange"><h2>21</h2>Acessos Suspeitos</div>
<div class="card green"><h2>14</h2>Bloqueados</div>
</div>

<div class="table">
<table>
<thead>
<tr>
<th>Usuário</th>
<th>IP</th>
<th>Navegador</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>
fetch("/api/logins")
.then(r=>r.json())
.then(data=>{
let html='';
data.forEach(u=>{
html+=`
<tr>
<td>${u.user}</td>
<td>${u.ip}</td>
<td>${u.browser}</td>
<td>${u.status||'Ativo'}</td>
<td>
<button class="btn block">Bloquear</button>
<button class="btn unblock">Desbloquear</button>
<button class="btn details">Detalhes</button>
<button class="btn notify">Notificar</button>
</td>
</tr>`
})
document.getElementById("table").innerHTML=html
})
</script>

</body>
</html>
