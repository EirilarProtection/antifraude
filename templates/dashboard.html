<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Antifraude Dashboard</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

.container {
    padding:30px;
}

h1 {
    color:#38bdf8;
}

.table {
    width:100%;
    border-collapse: collapse;
    margin-top:20px;
}

.table th, .table td {
    border:1px solid #334155;
    padding:10px;
    text-align:left;
}

.table th {
    background:#1e293b;
}

.card {
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}
</style>

</head>

<body>
<div class="container">

<h1>Antifraude System</h1>

<div class="card">
    Logs em tempo real do sistema
</div>

<table class="table">
    <tr>
        <th>ID</th>
        <th>IP</th>
        <th>User-Agent</th>
        <th>Rota</th>
        <th>Data</th>
    </tr>

    {% for log in logs %}
    <tr>
        <td>{{ log.id }}</td>
        <td>{{ log.ip }}</td>
        <td>{{ log.user_agent }}</td>
        <td>{{ log.path }}</td>
        <td>{{ log.created_at }}</td>
    </tr>
    {% endfor %}
</table>

</div>
</body>
</html>
