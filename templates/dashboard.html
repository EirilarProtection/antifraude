<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eirilar AntiFraude</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f5f5f5}
.sidebar{position:fixed;left:0;top:0;width:260px;height:100%;background:#fff;border-right:1px solid #ddd}
.logo{text-align:center;padding:20px}
.logo img{max-width:180px}
.menu a{display:block;padding:14px 20px;color:#333;text-decoration:none}
.menu a:hover{background:#c1121f;color:#fff}
.main{margin-left:260px;padding:20px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}
.card{background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
h1{color:#c1121f}
</style>
</head>
<body>
<div class="sidebar">
<div class="logo">
<img src="https://i.ibb.co/XrCbLdJR/eirilar-logo-vermelho.png" alt="Eirilar">
</div>
<div class="menu">
<a href="#">Dashboard</a>
<a href="#">Usuários</a>
<a href="#">Transações</a>
<a href="#">Eventos de Fraude</a>
<a href="#">Alertas</a>
<a href="#">Dispositivos</a>
<a href="#">Geolocalização</a>
<a href="#">Lista Negra</a>
<a href="#">Relatórios</a>
<a href="#">Configurações</a>
</div>
</div>
<div class="main">
<h1>Painel Antifraude Eirilar</h1>
<div class="cards">
<div class="card"><h3>Usuários</h3><p>0</p></div>
<div class="card"><h3>Transações</h3><p>0</p></div>
<div class="card"><h3>Fraudes</h3><p>0</p></div>
<div class="card"><h3>Alertas</h3><p>0</p></div>
</div>
</div>
</body>
</html>
