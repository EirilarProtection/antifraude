<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  width: 220px;
  height: 100%;
  background: #0f172a;
  padding: 20px;
}

.sidebar a {
  display: block;
  color: white;
  text-decoration: none;
  margin: 12px 0;
}

/* MAIN */
.main {
  margin-left: 240px;
  padding: 20px;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
}

.card {
  background: #111827;
  padding: 20px;
  border-radius: 12px;
}

/* TABLE */
.panel {
  margin-top: 20px;
  background: #111827;
  padding: 20px;
  border-radius: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #1f2937;
}
</style>

</head>

<body>

<div class="sidebar">
  <h2>ANTI FRAUDE</h2>
  <a href="/dashboard">Dashboard</a>
  <a href="/logout">Sair</a>
</div>

<div class="main">

  <h1>Dashboard</h1>

  <div class="cards">

    <div class="card">
      <h3>Usuários</h3>
      <p>{{ users }}</p>
    </div>

    <div class="card">
      <h3>Orders</h3>
      <p>{{ orders }}</p>
    </div>

    <div class="card">
      <h3>Fraudes</h3>
      <p>{{ frauds }}</p>
    </div>

    <div class="card">
      <h3>Alertas</h3>
      <p>{{ alerts }}</p>
    </div>

  </div>

  <div class="panel">

    <h2>Últimos eventos</h2>

    <table>
      <tr>
        <th>ID</th>
        <th>Status</th>
        <th>Valor</th>
      </tr>

      {% for o in last_orders %}
      <tr>
        <td>{{ o[0] }}</td>
        <td>{{ o[1] }}</td>
        <td>{{ o[2] }}</td>
      </tr>
      {% endfor %}

    </table>

  </div>

</div>

</body>
</html>
