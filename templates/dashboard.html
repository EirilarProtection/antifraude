<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Security Panel</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    background: #fff;
    height: 100vh;
    position: fixed;
    box-shadow: 2px 0 15px rgba(0,0,0,0.05);
}

/* MAIN */
.main {
    margin-left: 260px;
    padding: 25px;
    width: 100%;
}

.table {
    width: 100%;
    margin-top: 20px;
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
}

.table th {
    background: #c62828;
    color: white;
    padding: 12px;
}

.table td {
    padding: 12px;
    border-bottom: 1px solid #eee;
}

.btn {
    padding: 6px 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    margin: 2px;
}

.block { background: #e74c3c; color: white; }
.unblock { background: #2ecc71; color: white; }
.details { background: #3498db; color: white; }
.notify { background: #f39c12; color: white; }

.tag {
    padding: 4px 8px;
    border-radius: 20px;
    font-size: 11px;
    color: white;
}

.active { background: #2ecc71; }
.blocked { background: #e74c3c; }
.analysis { background: #f39c12; }

.blocked-row {
    background: #ffe6e6;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.modal-box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 420px;
}
</style>
</head>

<body>

<div class="main">

<h2>Security Panel</h2>

<table class="table">
<thead>
<tr>
<th>User</th>
<th>IP</th>
<th>City</th>
<th>State</th>
<th>Country</th>
<th>Browser</th>
<th>Status</th>
<th>Date</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-box">
        <h3>Detalhes do Usuário</h3>
        <div id="modalContent"></div>
        <br>
        <button onclick="closeModal()">Fechar</button>
    </div>
</div>

<script>

// ================= MODAL =================
function openModal(data){
    document.getElementById("modalContent").innerHTML = `
        <b>User:</b> ${data.username}<br>
        <b>Email:</b> ${data.email}<br>
        <b>Risk:</b> ${data.risk_score}<br>
        <b>Level:</b> ${data.risk_level}<br>
        <b>Status:</b> ${data.status}<br>
        <b>Phone:</b> ${data.phone || '-'}<br>
        <b>Address:</b> ${data.address || '-'}<br>
        <b>Payment:</b> ${data.payment_method || '-'}
    `;
    document.getElementById("modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

// ================= ACTIONS =================
async function blockUser(id){
    await fetch(`/api/block_user/${id}`, { method:"POST" });
    location.reload();
}

async function unblockUser(id){
    await fetch(`/api/unblock_user/${id}`, { method:"POST" });
    location.reload();
}

async function notifyUser(id){
    await fetch(`/api/notify_user/${id}`, { method:"POST" });
    alert("Notificação enviada");
}

async function details(id){
    const r = await fetch(`/api/user/${id}`);
    const d = await r.json();
    openModal(d);
}

// ================= LOAD TABLE =================
fetch("/api/logins")
.then(r => r.json())
.then(data => {

    let table = document.getElementById("table");
    table.innerHTML = "";

    data.forEach(u => {

        let status = u.status || "Ativo";

        let statusClass =
            status === "Bloqueado" ? "blocked" :
            status === "Em Análise" ? "analysis" :
            "active";

        let rowClass = status === "Bloqueado" ? "blocked-row" : "";

        table.innerHTML += `
        <tr class="${rowClass}">
            <td>${u.user}</td>
            <td>${u.ip}</td>
            <td>${u.city}</td>
            <td>${u.state}</td>
            <td>${u.country}</td>
            <td>${u.browser}</td>

            <td><span class="tag ${statusClass}">${status}</span></td>

            <td>${u.date}</td>

            <td>
                <button class="btn block" onclick="blockUser(${u.user_id})">Bloquear</button>
                <button class="btn unblock" onclick="unblockUser(${u.user_id})">Desbloquear</button>
                <button class="btn details" onclick="details(${u.user_id})">Detalhes</button>
                <button class="btn notify" onclick="notifyUser(${u.user_id})">Notificar</button>
            </td>
        </tr>
        `;
    });
});

</script>

</body>
</html>
